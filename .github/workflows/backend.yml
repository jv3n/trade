name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

# Workflow-level baseline — every job inherits `contents: read`. Linters (Sonar / CodeQL
# `actions/missing-workflow-permissions`) require this block at workflow scope, not just job
# scope, because a job-only declaration leaves any *future* job back on the default permissive
# token. Jobs that need more (e.g. SARIF upload) override below.
permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Required so the "Upload Detekt SARIF" step can post findings to the Code Scanning API
      # (visible in the repo's Security tab). Default GITHUB_TOKEN doesn't grant this.
      security-events: write
      # Required so the "Comment coverage on PR" step (Kover XML → sticky PR comment via
      # madrapps/jacoco-report) can write the coverage table to the PR conversation. No-op on
      # push events — the action only fires when `github.event_name == 'pull_request'`.
      pull-requests: write

    # No `services:` block — integration tests boot their own Postgres via Testcontainers
    # (`backend/src/test/kotlin/com/portfolioai/testsupport/PostgresContainer.kt`). Docker is
    # already available on `ubuntu-latest` runners, no extra setup needed.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Replaces a manual `actions/cache` on `~/.gradle` with the Gradle-maintained action that
      # caches three layers : (1) dependency cache, (2) build cache (incremental task outputs —
      # compileKotlin, test, detekt), (3) configuration cache (skips Gradle's config phase, ~5-10 s
      # per run). Read-only on PRs to avoid concurrent writers thrashing the cache key ; writeable
      # on master where the cache is the source-of-truth for downstream branches.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Build & test
        working-directory: backend
        run: ./gradlew build --build-cache
        env:
          # `SPRING_DATASOURCE_*` are no longer injected here — Testcontainers boots a per-run
          # Postgres in Docker and publishes the JDBC coordinates as system properties at JUnit
          # launcher-session open (cf. `testsupport/TestcontainersBootstrap.kt`).
          # `ANTHROPIC_API_KEY` stays as a defensive placeholder so any future test that wires
          # the LLM client without `@TestPropertySource` doesn't crash on an empty `@Value`.
          ANTHROPIC_API_KEY: local-placeholder

      # Coverage reports — Kover is wired in `build.gradle.kts`. Runs after `build` (which executes
      # `test` and produces the binary `.bin` Kover instruments) so this step just renders. `if:
      # always()` so the report is generated even if a downstream task (e.g. Detekt) failed —
      # diagnosing a flake is easier with the coverage view at hand.
      - name: Generate coverage reports
        if: always()
        working-directory: backend
        run: ./gradlew koverHtmlReport koverXmlReport --build-cache

      # Surface Detekt findings into GitHub Code Scanning (Security tab). `if: always()` so a
      # failed test doesn't swallow the SARIF — Detekt generates it before tests run anyway.
      # The `hashFiles` guard skips this step when Detekt itself crashed and didn't produce a
      # report — otherwise we'd stack a false "SARIF missing" error on top of the real Detekt
      # failure and confuse the CI summary.
      - name: Upload Detekt SARIF to Code Scanning
        if: always() && hashFiles('backend/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/build/reports/detekt/detekt.sarif
          category: detekt

      # HTML report as a downloadable artifact for offline review (linked from the Actions run).
      - name: Upload Detekt HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: backend/build/reports/detekt/detekt.html
          if-no-files-found: ignore

      # Kover HTML browseable locally — download the artifact, unzip, open `index.html` to
      # navigate by package / class / line. The XML companion lives in the same dir for any
      # external tooling that wants the structured form.
      - name: Upload Kover coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/build/reports/kover/
          if-no-files-found: ignore

      # At-a-glance summary on the run page — parses the Kover XML report (JaCoCo-compatible
      # schema) and writes a Markdown table of root-level counters to `$GITHUB_STEP_SUMMARY`.
      # No external action ; pure Python (pre-installed on `ubuntu-latest`). The trailing
      # `<counter>` elements at the root scope hold the cumulative project totals.
      - name: Coverage summary
        if: always() && hashFiles('backend/build/reports/kover/report.xml') != ''
        run: |
          python3 <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          tree = ET.parse('backend/build/reports/kover/report.xml')
          root = tree.getroot()
          # Root-level <counter> elements (direct children of <report>) hold the totals.
          counters = [c for c in root if c.tag == 'counter']
          print('## Backend coverage')
          print()
          if not counters:
              print('_No coverage data — Kover did not produce any counter._')
          else:
              print('| Metric | Covered | Total | % |')
              print('|---|---|---|---|')
              for c in counters:
                  t = c.get('type', '?')
                  missed = int(c.get('missed', '0'))
                  covered = int(c.get('covered', '0'))
                  total = missed + covered
                  pct = (100 * covered / total) if total else 0.0
                  print(f'| {t} | {covered} | {total} | {pct:.1f}% |')
          PY

      # Sticky PR comment with the backend coverage breakdown (overall + changed files vs base).
      # Kover XML is JaCoCo-compatible, so `madrapps/jacoco-report` reads it natively. The action
      # tags its comment by `title` so it edits the same comment on every push to the PR rather
      # than spamming — the frontend equivalent (vitest-coverage-report-action in `frontend.yml`)
      # uses its own `name` discriminator, so the two coexist without colliding. No-op on push
      # master because there's no PR to comment on.
      #
      # **Pinned to `@v1.7.2`** (and not the floating `@v1` major) because that tag is sticky to
      # an older commit (`be8ba5e9`) whose `action.yml` only declares 4 inputs (`path` singular,
      # `token`, `min-coverage-overall`, `min-coverage-changed-files`) — the modern inputs
      # `paths` (plural), `title`, `update-comment` were added in v1.7.0 and the maintainer
      # never moved the `v1` major tag forward. Without the explicit pin, the action errors with
      # « ENOENT: no such file or directory, open '' » because our `paths:` value is silently
      # dropped as an unknown input and the action falls back to an empty default.
      - name: Comment coverage on PR
        if: |
          always()
          && github.event_name == 'pull_request'
          && hashFiles('backend/build/reports/kover/report.xml') != ''
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: backend/build/reports/kover/report.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Backend coverage
          update-comment: true
          min-coverage-overall: 0
          min-coverage-changed-files: 0
