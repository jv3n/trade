name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

# Workflow-level baseline — every job inherits `contents: read`. Linters (Sonar / CodeQL
# `actions/missing-workflow-permissions`) require this block at workflow scope, not just job
# scope, because a job-only declaration leaves any *future* job back on the default permissive
# token. Jobs that need more (e.g. SARIF upload) override below.
permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Required so the "Upload Detekt SARIF" step can post findings to the Code Scanning API
      # (visible in the repo's Security tab). Default GITHUB_TOKEN doesn't grant this.
      security-events: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolioai
          POSTGRES_USER: portfolioai
          POSTGRES_PASSWORD: portfolioai
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Replaces a manual `actions/cache` on `~/.gradle` with the Gradle-maintained action that
      # caches three layers : (1) dependency cache, (2) build cache (incremental task outputs —
      # compileKotlin, test, detekt), (3) configuration cache (skips Gradle's config phase, ~5-10 s
      # per run). Read-only on PRs to avoid concurrent writers thrashing the cache key ; writeable
      # on master where the cache is the source-of-truth for downstream branches.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Build & test
        working-directory: backend
        run: ./gradlew build --build-cache
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/portfolioai
          SPRING_DATASOURCE_USERNAME: portfolioai
          SPRING_DATASOURCE_PASSWORD: portfolioai
          ANTHROPIC_API_KEY: local-placeholder

      # Surface Detekt findings into GitHub Code Scanning (Security tab). `if: always()` so a
      # failed test doesn't swallow the SARIF — Detekt generates it before tests run anyway.
      # The `hashFiles` guard skips this step when Detekt itself crashed and didn't produce a
      # report — otherwise we'd stack a false "SARIF missing" error on top of the real Detekt
      # failure and confuse the CI summary.
      - name: Upload Detekt SARIF to Code Scanning
        if: always() && hashFiles('backend/build/reports/detekt/detekt.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/build/reports/detekt/detekt.sarif
          category: detekt

      # HTML report as a downloadable artifact for offline review (linked from the Actions run).
      - name: Upload Detekt HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: backend/build/reports/detekt/detekt.html
          if-no-files-found: ignore
