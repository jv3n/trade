name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

# Workflow-level baseline `contents: read` ; le job `deploy` override en `contents: write` pour
# pousser sur la branche `gh-pages` via `mkdocs gh-deploy`.
permissions:
  contents: read

# Sérialise les déploiements docs : `mkdocs gh-deploy` fait fetch puis force-push sur `gh-pages`,
# et même avec `--force` le compare-and-swap atomique côté serveur git rejette le push si un autre
# run a écrit sur la branche entre le fetch et le push. `cancel-in-progress: false` parce que
# chaque commit docs mérite son déploiement (vs cancel qui pourrait perdre le dernier état si on
# pousse une rafale de commits).
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force
