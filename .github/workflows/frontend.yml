name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

# Workflow-level baseline — every job inherits `contents: read`. Jobs that need to write
# elsewhere (PR coverage comment below) override at job scope. Declaring this explicit baseline
# revokes every other implicit scope on `GITHUB_TOKEN`, satisfying the CodeQL
# "missing-explicit-permissions" hint.
permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    # Redondant avec le bloc workflow-level plus haut, mais Sonar / CodeQL veulent voir le scope
    # déclaré au niveau job aussi. Pas de coût (juste lecture du repo) et ça fige l'intention si
    # un futur job est ajouté sans permissions explicites. `pull-requests: write` autorise le
    # sticky comment de couverture posté sur les PRs (no-op sur push master).
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'frontend/.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Lint avant build : un linter qui pète tôt évite de cramer ~10 s de build pour rien. Cible
      # `eslint.config.js` (flat config, Angular 21) — voir `frontend/eslint.config.js`.
      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      # Tests + couverture en un seul appel (la `coverage` configuration de `angular.json`
      # ajoute juste les reporters HTML / LCOV / text-summary / json-summary par-dessus le run
      # standard). Pas de seuil bloquant pour l'instant — on publie le rapport en artefact et
      # on lit le step summary, on tune si la couverture descend de manière inattendue.
      - name: Test (with coverage)
        working-directory: frontend
        run: npm run test:coverage -- --watch=false

      # HTML browseable localement — download l'artefact, dézippe, ouvre `index.html` pour
      # naviguer fichier par fichier. LCOV (`lcov.info`) inclus pour outillage externe.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          if-no-files-found: ignore

      # At-a-glance summary on the run page — parse le `coverage-summary.json` produit par le
      # reporter `json-summary` et émet une table Markdown des totaux projet. Le builder
      # `@angular/build:unit-test` écrit les rapports sous `coverage/<projectName>/` (ici
      # `coverage/frontend/`), pas directement à la racine `coverage/`. Pure Node (déjà
      # installé via setup-node ci-dessus), pas d'action externe.
      - name: Coverage summary
        if: always() && hashFiles('frontend/coverage/frontend/coverage-summary.json') != ''
        run: |
          node <<'JS' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const data = JSON.parse(
            fs.readFileSync('frontend/coverage/frontend/coverage-summary.json', 'utf8'),
          );
          const total = data.total || {};
          console.log('## Frontend coverage');
          console.log('');
          console.log('| Metric | Covered | Total | % |');
          console.log('|---|---|---|---|');
          for (const key of ['lines', 'statements', 'functions', 'branches']) {
            const m = total[key];
            if (!m) continue;
            const label = key[0].toUpperCase() + key.slice(1);
            console.log(`| ${label} | ${m.covered} | ${m.total} | ${m.pct.toFixed(1)}% |`);
          }
          JS

      # Sticky PR comment with the frontend coverage table + per-file diff vs base. The action
      # reads the `coverage-summary.json` we already generate (json-summary reporter wired in
      # `angular.json > test > configurations > coverage`) and edits a single comment on every
      # push to the PR rather than spamming. `name: Frontend` disambiguates from the sibling
      # backend comment posted by the Kover action in `backend.yml`. No-op on `push master`
      # because there's no PR to comment on — guarded by the `pull_request` event check.
      - name: Comment coverage on PR
        if: |
          always()
          && github.event_name == 'pull_request'
          && hashFiles('frontend/coverage/frontend/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Frontend
          json-summary-path: frontend/coverage/frontend/coverage-summary.json
          json-final-path: frontend/coverage/frontend/coverage-final.json
