name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

# Minimum permissions — this workflow only reads the repo to build and test. No SARIF upload,
# no PR comments, no deploy. Declaring an explicit `contents: read` revokes every other implicit
# scope on `GITHUB_TOKEN`, satisfying the CodeQL "missing-explicit-permissions" hint.
permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Angular maintains its own incremental compilation cache in `.angular/cache/` (separate
      # from npm). Caching it cuts `npm run build` from ~30 s to ~10 s on subsequent runs.
      # Key on package-lock.json so a dep bump invalidates ; restore-keys allows partial reuse
      # across small changes.
      - name: Cache Angular build
        uses: actions/cache@v5
        with:
          path: frontend/.angular/cache
          key: angular-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/angular.json') }}
          restore-keys: |
            angular-${{ hashFiles('frontend/package-lock.json') }}-
            angular-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm test -- --watch=false
