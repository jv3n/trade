# GitHub Code Scanning — CodeQL static analysis.
# Findings (vulnérabilités, anti-patterns) apparaissent dans l'onglet "Security → Code scanning"
# du repo. Gratuit pour les repos publics.
#
# Une seule passe couvre les deux faces de l'app :
#   - `java-kotlin` (backend Kotlin/Spring) — build-mode `manual` : on compile sans tests pour
#     éviter de devoir exposer Postgres ici (la CI métier `backend.yml` reste l'autorité tests).
#   - `javascript-typescript` (frontend Angular) — build-mode `none` : CodeQL extrait sans build.

name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Lundi 06:00 UTC — relit le code même sans PR de la semaine, attrape les nouvelles règles
    # CodeQL et les vulnérabilités de deps qui auraient été publiées entre-temps.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      # Same Gradle cache action as backend.yml — the build cache layer is shared between the
      # two workflows on master, so a CodeQL run after a backend.yml run benefits from the
      # already-compiled tasks. Read-only on PRs to avoid mutual cache thrashing.
      - name: Set up Gradle
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # TRAP cache stores the result of CodeQL's extraction step (compiled DB) per language
          # so subsequent runs on similar code skip re-extraction. Big win on Java/Kotlin where
          # extraction is the bottleneck (~2 min cold) ; smaller on JS/TS but still helpful.
          trap-caching: true

      - name: Compile Kotlin (no tests, no DB)
        if: matrix.language == 'java-kotlin'
        working-directory: backend
        run: ./gradlew compileKotlin compileTestKotlin -x test --build-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
