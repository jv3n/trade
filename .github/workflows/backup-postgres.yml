name: Backup Supabase Postgres

# Weekly `pg_dump` of the Supabase database to Cloudflare R2 for exit-discipline. Keeps our own
# archive independent of Supabase's proprietary snapshot format — if Supabase shrinks the free
# tier or disappears, we restore from R2 to any Postgres elsewhere (Neon, Fly Postgres, VPS…).
# Cadence weekly suffisante pour un dev solo (Supabase free tier fait déjà des snapshots
# quotidiens avec rétention 7j → notre backup R2 est le filet long-terme, pas le rolling court).
# Rétention 30 backups (~7 mois d'historique au rythme hebdo).
#
# Setup pré-requis (cf. `docs/devops/backup-process.md`) :
#   - R2 bucket `portfolioai-backups` créé chez Cloudflare
#   - 3 GitHub Secrets : R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
#   - 3 GitHub Variables repo-level : GCP_PROJECT, GCP_WIF_PROVIDER, GCP_SA_EMAIL
#   - Grant `roles/secretmanager.secretAccessor` à `github-deploy@` sur `supabase-db-url`

on:
  schedule:
    # Dimanche 4 AM UTC = samedi soir minuit Eastern = creux d'activité. Une fois par semaine.
    - cron: '0 4 * * 0'
  # Manual trigger pour les spot backups avant une opération risquée (migration schema, fix SQL
  # manuel, etc.) et pour les restore drills trimestriels.
  workflow_dispatch:

# Un backup à la fois — cron + workflow_dispatch races théoriques (l'user trigger un manual
# pendant que le cron tourne). Serialize pour éviter deux `aws s3 cp` qui se battent sur le
# même filename.
concurrency:
  group: backup-postgres
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backup:
    name: Dump and upload to R2
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # WIF — même pattern que deploy.yml. Le SA `github-deploy@` doit avoir
      # `roles/secretmanager.secretAccessor` sur `supabase-db-url` (one-time, cf. doc setup).
      id-token: write

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Le `pg_dump` qui ship par défaut sur `ubuntu-latest` peut être 1-2 majeurs en retard sur
      # Supabase (PG 15 free tier en 2026). On installe `postgresql-client-16` depuis l'apt repo
      # officiel Postgres — un pg_dump client plus récent peut toujours dumper un serveur plus
      # ancien, donc 16 contre 15 marche, et nous donne 1 majeur de buffer si Supabase upgrade
      # silently.
      - name: Install postgresql-client-16
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update --quiet
          sudo apt-get install --yes --quiet postgresql-client-16
          pg_dump --version

      # Le secret `supabase-db-url` contient une URL **JDBC** (`jdbc:postgresql://...?user=...
      # &password=...&sslmode=require`) — libpq ne tolère pas le préfixe `jdbc:`. On le strip,
      # le reste de l'URL (user/password en query params, sslmode) est compatible libpq URI.
      # On `::add-mask::` la valeur pour qu'elle n'apparaisse pas en clair si un step ultérieur
      # l'écrit accidentellement dans les logs.
      - name: Read DATABASE_URL from Secret Manager
        id: db
        run: |
          JDBC_URL=$(gcloud secrets versions access latest \
            --secret=supabase-db-url \
            --project=${{ vars.GCP_PROJECT }})
          LIBPQ_URL="${JDBC_URL#jdbc:}"
          echo "::add-mask::$LIBPQ_URL"
          echo "url=$LIBPQ_URL" >> "$GITHUB_OUTPUT"

      # `--no-owner --no-acl` : le dump est restore-portable vers n'importe quelle instance
      # Postgres sans que les rôles Supabase-spécifiques existent côté target. Format `plain`
      # (SQL lisible) + gzip plutôt que `custom` — moins compact mais inspectable avec
      # `zgrep`/`zless` pendant un incident, ce qui vaut le trade pour single-user.
      # Filename ISO timestamp UTC → trié lexicographique = trié chronologique, simplifie la
      # rotation et autorise plusieurs runs le même jour (workflow_dispatch manuel).
      - name: Dump database
        env:
          DATABASE_URL: ${{ steps.db.outputs.url }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          FILE="backup-$TIMESTAMP.sql.gz"
          pg_dump "$DATABASE_URL" --no-owner --no-acl --format=plain | gzip > "$FILE"
          ls -lh "$FILE"
          echo "file=$FILE" >> "$GITHUB_ENV"

      # R2 est S3-compatible : `aws s3` marche en pointant `--endpoint-url`. La région virtuelle
      # `auto` est la convention R2 (pas de région réelle, replication transparente côté
      # Cloudflare).
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          aws s3 cp "$file" "s3://portfolioai-backups/$file" --endpoint-url "$ENDPOINT_URL"
          echo "uploaded=s3://portfolioai-backups/$file" >> "$GITHUB_ENV"

      # Garde les 30 plus récents, supprime les anciens. `aws s3 ls` retourne
      # "DATE TIME SIZE NAME" trié alphabétiquement par NAME ; comme NAME est ISO-timestamped UTC,
      # le tri alpha = tri chronologique. `head -n -30` retire les 30 dernières lignes (= les 30
      # plus récents) → reste les candidats à supprimer.
      - name: Prune backups older than the 30 most recent
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          OLD=$(aws s3 ls "s3://portfolioai-backups/" --endpoint-url "$ENDPOINT_URL" \
            | grep -E 'backup-.*\.sql\.gz$' \
            | sort \
            | head -n -30 \
            | awk '{print $4}')
          if [ -z "$OLD" ]; then
            echo "Nothing to prune (less than 30 backups in bucket)."
            exit 0
          fi
          echo "Pruning the following objects:"
          echo "$OLD"
          echo "$OLD" | xargs -I {} aws s3 rm "s3://portfolioai-backups/{}" --endpoint-url "$ENDPOINT_URL"

      - name: Summary
        run: |
          {
            echo "## Backup summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| File | \`$file\` |"
            echo "| Destination | \`$uploaded\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
