# Dependabot — alerts + auto-PRs sur deps obsolètes ou vulnérables.
# Doc : https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Stratégie :
# - Passe quotidienne à 06:00 (America/Toronto) sur les 3 écosystèmes.
# - **Pas de majors**. Chaque écosystème ignore `version-update:semver-major` via une règle
#   catch-all `dependency-name: '*'`. Un major peut embarquer des breaking changes silencieux
#   (ex : springdoc 3.x cible Spring Boot 4, Kotlin 2.1 → 2.3 casse le `resolutionStrategy`
#   Detekt qui pin Kotlin 2.0.10) — on les traite manuellement quand le contexte est prêt.
# - Les **groupes** bundle les packages liés (Angular, Spring Boot, ngx-translate) sur leurs
#   patches — peer-deps ou plugins solidaires d'un même bump. `update-types: [patch]` dans un
#   groupe filtre uniquement ce qui est groupé ensemble (pas ce que Dependabot ouvre, d'où le
#   filtre `ignore` ci-dessus).
# - Les **`ignore`** spécifiques bloquent en plus les bumps qu'on sait perdants d'avance
#   (peer dep d'Angular sur TS, bridge Kotlin chez Detekt). Dependabot rouvre automatiquement
#   quand le contexte change.
# - `open-pull-requests-limit: 10` — large mais borne le bruit en cas de gros backlog.

version: 2

updates:
  # ─────────────────────────────────────────────────────────────────────── Backend Gradle
  - package-ecosystem: gradle
    directory: /backend
    schedule:
      interval: daily
      time: '06:00'
      timezone: America/Toronto
    open-pull-requests-limit: 10
    groups:
      # Spring Boot : starter + plugin + dependency-management bougent solidaires sur leurs patches.
      spring-boot:
        patterns:
          - 'org.springframework.boot*'
          - 'io.spring.dependency-management'
        update-types:
          - patch
      # Catch-all patch sur tout le reste.
      patch:
        update-types:
          - patch
    ignore:
      # Catch-all : pas de major. Cf. en-tête du fichier (springdoc 3.x → Spring Boot 4, etc.).
      # Cette règle subsume les blocs major-only par dépendance (Detekt 2.0 qui demanderait de
      # retirer le `resolutionStrategy` Kotlin 2.0.10 ; Spotless major qui pourrait reformater
      # toute la codebase). Les commentaires restent à titre de mémo pour le bump manuel.
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  # ─────────────────────────────────────────────────────────────────────── Frontend npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: daily
      time: '06:00'
      timezone: America/Toronto
    open-pull-requests-limit: 10
    groups:
      # Angular : tous les `@angular/*` et `@angular-*/*` doivent bumper en même temps, sinon
      # peer-deps internes incohérentes (un `@angular/build` qui exige le même major que
      # `@angular/compiler-cli` etc.). Une seule PR Angular patch → review en bloc.
      angular:
        patterns:
          - '@angular/*'
          - '@angular-*/*'
          - '@ngtools/*'
        update-types:
          - patch
      # ngx-translate : core + http-loader bougent ensemble.
      ngx-translate:
        patterns:
          - '@ngx-translate/*'
        update-types:
          - patch
      # Catch-all patch sur tout le reste.
      patch:
        update-types:
          - patch
    ignore:
      # Catch-all : pas de major. Cf. en-tête du fichier. Subsume notamment le major TypeScript
      # (borné par la peer dep d'Angular `>=5.9 <6.0` pour Angular 21 — Dependabot rouvrira la
      # PR automatiquement quand on bumpera Angular en major).
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
      # Zone.js — explicitement retiré du projet (zoneless). Dependabot ne devrait pas le voir,
      # mais si un transitif le réintroduit on bloque tous les bumps (pas que les majors).
      - dependency-name: 'zone.js'

  # ─────────────────────────────────────────────────────────────────────── GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '06:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    groups:
      # Pas de sous-groupe — les actions GitHub sont peu nombreuses, le `patch` suffit.
      patch:
        update-types:
          - patch
    ignore:
      # Catch-all : pas de major. Cf. en-tête du fichier.
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
