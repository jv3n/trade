# Detekt configuration — tuned for Kotlin / Spring Boot / JPA / JUnit project
# ============================================================================
#
# We start from `buildUponDefaultConfig = true` (set in build.gradle.kts) and override only the
# rules whose default settings are calibrated for "library code" but are too strict for an
# idiomatic Spring application :
#
# - JPA entities legitimately have 8-14 `@Column` constructor params.
# - `jakarta.persistence.*` / `org.springframework.web.bind.annotation.*` / JUnit `Assertions.*`
#   are universally wildcard-imported in Kotlin Spring projects.
# - Percent calculations (`× 100`), HTTP status codes (404, 429), and millisecond timeouts are
#   "magic" but *domain meaningful* — defining a named constant for each is over-engineered.
# - `@PathVariable` Spring controller params must be declared even when unused in the body
#   (the framework matches them to URL placeholders).
#
# Anything we can't tame here without losing real signal is fixed in code instead. See the
# backlog entry "Linter ESLint côté frontend" for the symmetric story on the JS side.

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true

# -------------------------------------------------------------------- complexity ----------------

complexity:
  LongMethod:
    active: true
    # Default 60 — bumped because LLM prompt builders and CSV parsers legitimately stretch.
    # `CsvImportService.import` (~135 lines) and `.parseCsv` (~120 lines) are sequences of column
    # reads + lifecycle bookkeeping that read better as a single linear flow than as a chain of
    # private helpers ; the alternative would scatter the per-row decision (open / closed /
    # reopened, batch counters, warnings) across 4-5 functions and force the reader to jump.
    # Splitting them wouldn't make them more testable either — the unit test asserts on the
    # final `CsvImportResult` shape, not on intermediate steps.
    threshold: 150
  LongParameterList:
    active: true
    functionThreshold: 8
    # JPA entities (`Asset`, `Recommendation`, `TickerNarrativeSnapshot`…) have 8-14 `@Column`
    # params by design — that's the schema, not a code smell. Annotation-based exclusion below
    # also catches `@Embeddable` and `@MappedSuperclass`. `AppConfigService` used to carry 14
    # `@Value` injected defaults and bumped this threshold to 16 ; the v3 refactor (ticket #B6,
    # livré 2026-05-15) split those into `SecretsDefaults` / `DataProvidersDefaults` /
    # `LlmDefaults` `@Component` data classes, dropping the service constructor back to 6 params.
    # Threshold restored to the default 8 — if a new bean grows past it, prefer the same
    # grouped-`@Value` pattern over re-bumping.
    constructorThreshold: 8
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotated:
      - 'Entity'
      - 'Embeddable'
      - 'MappedSuperclass'
  CyclomaticComplexMethod:
    active: true
    # Default 15 — bumped for `when` blocks with many branches that are intrinsically a lookup
    # table (TwelveDataClient.outputSizeFor, MockMarketChartClient.barCountFor — each branch is
    # one expression). The metric counts branches, but the cognitive load is low.
    threshold: 25
  TooManyFunctions:
    active: true
    thresholdInClasses: 16
    thresholdInObjects: 16
    thresholdInFiles: 18
  NestedBlockDepth:
    active: true
    threshold: 5
  ComplexCondition:
    active: true
    # Default 4 — bumped to 5 for null-check chains in JSON / CSV mappers (`if (open == null
    # || high == null || low == null || close == null || volume == null)` legitimately reads
    # that way and is clearer than a helper).
    threshold: 5

# -------------------------------------------------------------------- style ---------------------

style:
  MagicNumber:
    active: true
    # Tests are riddled with magic numbers (prices, quantities, timestamps) that read naturally as
    # values rather than constants. Excluding the test source set avoids 100+ pointless findings.
    # `Mock*Client.kt` are dev-only synthetic generators (volatility, drift, bar counts, EPS bands,
    # bias thresholds — tuning constants that are clearer inline than as named consts).
    # `IndicatorCalculator` uses well-known financial periods (21=1mo, 63=3mo, 252=1y) that any
    # trader recognises. `TwelveDataClient` carries the bar-count lookup table for the chart
    # endpoint (each `range × interval` cell is a single integer ; named constants would obscure
    # the table). `ConfigTestClient` carries HTTP probe timeouts and message-preview lengths
    # (`.take(120)`) that are formatting / I/O knobs, not algorithmic constants.
    excludes:
      - '**/test/**'
      - '**/*Test.kt'
      - '**/*Tests.kt'
      - '**/Mock*Client.kt'
      - '**/IndicatorCalculator.kt'
      - '**/TwelveDataClient.kt'
      - '**/ConfigTestClient.kt'
    # Whitelisted small + common values. Includes percent-100, RSI-50, HTTP status codes (4xx),
    # standard ms timeouts (5_000 / 10_000 etc.), validator thresholds (3-7), and basic counts.
    ignoreNumbers:
      - '-2'
      - '-1'
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '10'
      - '12'
      - '14'
      - '15'
      - '20'
      - '24'
      - '30'
      - '50'
      - '60'
      - '100'
      - '140'
      - '200'
      - '255'
      - '365'
      - '401'
      - '403'
      - '404'
      - '429'
      - '500'
      - '1000'
      - '0.5'
      - '1.0'
      - '50.0'
      - '100.0'
    ignoreHashCodeFunction: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreNamedArgument: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreConstantDeclaration: true
    ignorePropertyDeclaration: true
    ignoreAnnotated:
      - 'Configuration'
      - 'ConfigurationProperties'
  # WildcardImport is enforced by Spotless+ktlint in build.gradle.kts (build-breaking) — this
  # Detekt rule would only duplicate the report into the SARIF without adding value.
  WildcardImport:
    active: false
  MaxLineLength:
    active: true
    # Spotless ktfmt enforces 100 already on most lines ; this is a fallback for legitimate
    # outliers : JPQL queries (single-line by JPA convention), CSV row template strings in tests,
    # and inline error messages with interpolations. 160 covers everything we've actually got.
    maxLineLength: 160
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: true
  ReturnCount:
    active: true
    # Kotlin idioms with early null-returns + `?.let` easily blow the default of 2. The
    # `IndicatorCalculator` functions have intentional guard returns at the top.
    max: 5
  ThrowsCount:
    active: true
    # Bumped to 6 — error mapping in HTTP clients (TwelveDataClient.fetchTimeSeries,
    # FinnhubAnalystClient.fetchRecommendations, FinnhubEarningsClient.fetchEarnings) and the
    # narrative parser (TickerNarrativeParser.parse) genuinely needs to throw 6 distinct domain
    # errors. Finnhub specifically splits 401 (Unauthorized → bad key) from 403 (Forbidden →
    # paid-tier endpoint) into two `auth-failed` reasons because the operator action differs ;
    # collapsing them would lose the diagnostic that lives in the catch handler.
    max: 6
  UseCheckOrError:
    # `throw IllegalStateException(...)` reads more clearly than `error(...)` in some places —
    # opinion call. We don't enforce.
    active: false
  UseRequire:
    # Same as above for `IllegalArgumentException`.
    active: false
  ForbiddenComment:
    # TODO / FIXME / HACK comments are useful pointers, not noise.
    active: false
  LoopWithTooManyJumpStatements:
    # CSV import iterates through rows with multiple `continue` to skip malformed entries —
    # idiomatic for this kind of fault-tolerant parsing. No real refactor opportunity.
    active: false
  UnusedParameter:
    active: true
    # Spring controller methods declare `@PathVariable` params even when the function body
    # doesn't read them — the framework still needs them to register the URL pattern. The
    # `_` prefix is the Kotlin convention for "intentionally unused".
    ignoreAnnotated:
      - 'PathVariable'
  UnusedPrivateProperty:
    active: true

# -------------------------------------------------------------------- exceptions ----------------

exceptions:
  TooGenericExceptionCaught:
    active: true
    # HTTP clients, async runners/executors, parsers and the CSV import controller legitimately
    # catch broad exceptions to map them to domain types (UpstreamUnavailableException, parser
    # fallback) or to surface a generic error to the user (controllers). Scoping the rule here
    # keeps it useful for the rest of the codebase without flagging deliberate adapter behaviour.
    excludes:
      - '**/infrastructure/market/**'
      - '**/infrastructure/llm/**'
      - '**/analysis/application/**'
      - '**/CsvImportController.kt'
      - '**/CsvImportService.kt'
      - '**/RssFetcherService.kt'
  SwallowedException:
    active: true
    # Variables named `_`, `ignore*` or `expected*` won't trigger — useful idiom for "I know
    # I'm dropping this, on purpose".
    allowedExceptionNameRegex: '_|(ignore|expected).*'

# -------------------------------------------------------------------- naming --------------------

naming:
  VariableNaming:
    active: true
    # Test fixtures use UPPER_SNAKE_CASE for what conceptually are constants (FAKE_API_KEY,
    # VALID_TIME_SERIES_BODY…). They can't be `const val` because the value is computed
    # (e.g. `.trimIndent()`). All current findings live in test files — exclude them via the
    # standard rule-level `excludes` list, same mechanism we use for `MagicNumber`.
    excludes:
      - '**/test/**'
      - '**/*Test.kt'
      - '**/*Tests.kt'
  MatchingDeclarationName:
    active: true
    # `*Models.kt` files are intentional vendor bundles : one file packs the 4-7 wire-format data
    # classes for a vendor (FinnhubModels, FinnhubProfileModels, TwelveDataProfileModels…). The
    # top-level type name doesn't match the file name on purpose, so the bundle reads as the unit
    # of cohesion (one file = one upstream API surface, mapped together). Splitting them into
    # one-class-per-file would scatter the wire format across N files for zero gain.
    excludes:
      - '**/*Models.kt'

# -------------------------------------------------------------------- performance ---------------

performance:
  SpreadOperator:
    # Spring Boot's main idiom : `runApplication<App>(*args)`. We have no other spread call
    # sites today, and no real signal from the rule.
    active: false

# -------------------------------------------------------------------- empty-blocks --------------

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
    # Spring Boot test convention : `BackendApplicationTests.contextLoads()` is intentionally
    # empty — its purpose is just to verify the application context boots.
    excludes:
      - '**/BackendApplicationTests.kt'
