spring.application.name=portfolioai-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolioai
spring.datasource.username=portfolioai
spring.datasource.password=portfolioai
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Claude API
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.model=claude-opus-4-6