server:
  # Port HTTP du backend natif. Surchargeable via `BACKEND_HOST_PORT` dans `.env` Г  la racine
  # du repo en cas de conflit avec un autre service local (cf. `.env.example`).
  port: ${BACKEND_HOST_PORT:8080}
  # En dev, le SPA Angular tourne sur un port distinct (4200/4201) et le proxy CLI forward
  # `/api/**`, `/oauth2/**`, `/logout`, `/login/oauth2/**` vers ce backend (cf. `frontend/proxy.conf.js`).
  # `xfwd: true` du proxy ajoute les headers `X-Forwarded-Host/Port/Proto`. `framework` fait que
  # Spring les lit via `ForwardedHeaderFilter` pour construire ses URLs absolues (notamment le
  # `redirect_uri` OAuth envoyГ© Г  Google) sur le host du SPA вЂ” sinon Google reГ§oit
  # `localhost:8081` et la session cookie ne sera pas accessible au SPA sur `localhost:4201`.
  # En prod derriГЁre un reverse proxy (nginx, traefik, ALB), mГЄme besoin : trust the forwarded
  # headers pour gГ©nГ©rer les URLs publiques correctes. Risque de spoofing : nul tant que le
  # backend n'est pas exposГ© directement Г  internet sans proxy devant вЂ” invariant tenu en prod
  # par le Google Front End Cloud Run + Cloudflare Worker, cf. `docs/technique/architecture.md
  # > DГ©cisions techniques notables > Phase 5 > Forward-headers strategy`. Sur VPS self-managed
  # (Hetzner, Oracle, etc.), basculer ici sur `NATIVE` + `server.tomcat.remoteip.internal-proxies`
  # pinnГ© sur l'IP du reverse proxy local (e.g. `127\.0\.0\.1|::1` pour nginx/Caddy sidecar).
  forward-headers-strategy: framework

spring:
  application:
    name: portfolioai-backend

  # **Profile activation pilotГ©e par Tilt** вЂ” le Tiltfile lit `BACKEND_AUTH_MODE` dans `.env` Г 
  # l'exГ©cution du `serve_cmd` :
  #   - `BACKEND_AUTH_MODE=no-auth` (dГ©faut) в†’ lance avec `--spring.profiles.active=local,local-no-auth`
  #     в†’ `LocalNoAuthSecurityConfig` bypasse Spring Security, user fake ADMIN (`dev@local.test`)
  #     seedГ© au boot et injectГ© dans le SecurityContext sur chaque request.
  #   - `BACKEND_AUTH_MODE=oauth` в†’ lance avec `--spring.profiles.active=local` в†’ `SecurityConfig`
  #     kicks in et utilise la registration `spring.security.oauth2.client.registration.google`
  #     dГ©clarГ©e dans `application-local.yml`. Vrai flow OAuth Google contre localhost.
  #
  # Bouton Tilt В« Switch auth mode в†’ oauth/no-auth В» disponible sur la ressource `backend` pour
  # flipper sans Г©diter `.env` Г  la main.
  #
  # Pas de `spring.profiles.group` hardcodГ© ici : la dГ©cision est entiГЁrement au Tiltfile, ce qui
  # permet le toggle runtime via bouton + restart sans toucher au YAML.

  # OAuth2 client registration вЂ” intentionally **absent** from this default config because Spring
  # Boot's `ClientRegistration.Builder.build()` does `Assert.hasText(clientId)` and crashes at boot
  # if a registration is declared with an empty client-id. A fresh clone / CI run needs to start
  # without OAuth credentials (the `@SpringBootTest` smoke test relies on this).
  #
  # Pour activer le vrai flow OAuth Google :
  #   1. CrГ©e un OAuth Client ID dans Google Cloud Console > APIs & Services > Credentials
  #      (Web application). Redirect URI : `http://localhost:<FRONTEND_HOST_PORT>/login/oauth2/code/google`
  #      (le port FRONT, pas backend вЂ” le proxy CLI forward avec xfwd et Spring construit son
  #      redirect_uri sur le host du SPA grГўce Г  `server.forward-headers-strategy: framework`).
  #   2. Dans `.env` Г  la racine (gitignored), dГ©finis :
  #        SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=...
  #        SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=...
  #        APP_ADMIN_EMAILS=ton.email@gmail.com    # pour atterrir en role ADMIN
  #        APP_FRONTEND_URL=http://localhost:4201/ # cible du redirect post-login
  #        BACKEND_AUTH_MODE=oauth                  # bascule du `local-no-auth` au mode rГ©el
  #   3. Restart Tilt вЂ” le `serve_cmd` du backend `source` `.env`, exporte les vars au sous-process
  #      gradle, et Spring Boot les pickГЁ up via son relaxed binding (env-var в†’ property tree).
  #   4. Le scope OAuth est laissГ© aux dГ©fauts Google fournis par `CommonOAuth2Provider.GOOGLE`
  #      (openid + profile + email) вЂ” pas besoin de le surcharger explicitement.
  # En prod, les mГЄmes env vars sont injectГ©es par le secret manager du provider.

  datasource:
    # Le port Postgres cГґtГ© hГґte est configurable via `POSTGRES_HOST_PORT` dans `.env`
    # (le container reste en 5432 en interne, seul le mapping host:container change). Cf.
    # `.env.example` pour la procГ©dure quand 5432 est dГ©jГ  occupГ© localement.
    url: jdbc:postgresql://localhost:${POSTGRES_HOST_PORT:5432}/portfolioai
    username: portfolioai
    password: portfolioai
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # **Baseline on migrate** (livrГ© 2026-05-17 avec la fusion V1в†’V10 en un seul V1).
    #
    # `baseline-version: 0` est intentionnel вЂ” empiriquement vГ©rifiГ© sur DB greenfield :
    # avec `baseline-version: 1`, Flyway baseline la `flyway_schema_history` Г  V1 et **n'applique
    # pas** V1 sur une DB vide в†’ rГ©sultat catastrophique, les 11 tables ne sont jamais crГ©Г©es
    # et Hibernate `ddl-auto: validate` crash au boot. Avec `baseline-version: 0`, le baseline
    # est posГ© AVANT V1, donc Flyway applique ensuite toutes les migrations >= 1 normalement.
    #
    # Sur une DB existante avec `flyway_schema_history` (cas dev local post-V10), le baseline
    # n'est pas re-dГ©clenchГ© (l'history existe dГ©jГ ). Pour upgrader cette DB sans repartir de
    # zГ©ro, la procГ©dure est : `docker compose down -v && tilt up` pour reset complet (perte
    # data acceptable single-user). Alternative non-destructive : drop manuellement la table
    # `flyway_schema_history` avant `tilt up` ; Flyway recrГ©e ensuite la table Г  partir de
    # zГ©ro et baseline Г  V0 + apply V1 sur le schГ©ma existant. Hibernate `validate` passe parce
    # que le schГ©ma est dГ©jГ  identique au V1 cible.
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      # `metrics` est inclus ici parce que le profil base sert aussi `local` (dev) oГ№ on peut
      # vouloir grep `/actuator/metrics` pour debug Г  la main (heap, HikariCP, http server.requests).
      # **En prod**, `application-prod.yml` surcharge cette liste Г  `health, info` uniquement вЂ”
      # `metrics` n'est PAS exposГ© en prod (cf. dГ©cision Phase 5 : surface publique minimale).
      # `SecurityConfig.kt` laisse `/actuator/**` autre que `/health` en `permitAll` (cf. commentaire
      # de la chaГ®ne de sГ©curitГ©), donc `/metrics` est public sur le profil base. Acceptable tant
      # qu'on tourne sur `localhost` ; **si tu partages la session via tunnel (ngrok, Cloudflare
      # Tunnel, etc.), exclus `metrics` ici** вЂ” ou ajoute un `requestMatchers("/actuator/**").authenticated()`
      # dans SecurityConfig avant de tunneler.
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  # `/actuator/info` вЂ” exposГ© via `endpoints.web.exposure` ci-dessus. Les contributeurs `build` et
  # `git` sont activГ©s par dГ©faut en Spring Boot 3.x (auto-dГ©tectent `build-info.properties` /
  # `git.properties` posГ©s par `springBoot.buildInfo()` + plugin `gradle-git-properties` dans
  # `build.gradle.kts`). `git.mode: full` exporte tous les champs dГ©clarГ©s dans `gitProperties.keys`
  # (commit message court + tags inclus) вЂ” le dГ©faut `simple` n'expose que `branch + commit.id +
  # commit.time`, ce qui prive l'endpoint de l'info utile pour corrГ©ler une rГ©vision Cloud Run Г 
  # un tag de release.
  info:
    git:
      mode: full

# Auth вЂ” application-level config consumed by `CustomOAuth2UserService` on first user creation
# to assign role ADMIN vs USER. Comma-separated list of emails. Email comparison is
# case-insensitive. Modifications to this list only affect *new* user creations вЂ” existing rows
# keep the role they were assigned on first login (DB is the source of truth post-creation).
#
# `frontend-url` est la cible du redirect post-login OAuth (cf. `SecurityConfig.defaultSuccessUrl`).
# DГ©faut `/` est correct quand le SPA et le backend partagent la mГЄme origine (prod derriГЁre un
# reverse proxy). En dev oГ№ le SPA tourne sur un port distinct (Angular CLI 4200/4201), surcharger
# dans `application-local.yml` avec l'URL complГЁte du SPA вЂ” sinon le user atterrit sur le backend
# (Whitelabel 404 aprГЁs login).
app:
  # Whether Ollama-related runtime configuration is exposed in this environment. Default `true`
  # (local dev runs Ollama in docker-compose alongside the backend) ; overridden to `false` in
  # `application-prod.yml` because the Phase 5 deploy decision (Cloud Run + Supabase) excludes
  # Ollama from prod вЂ” no daemon to reach. When `false`, the `llm.provider` toggle in
  # `/settings/configuration` hides the `ollama` option, the `ollama.model` entry is omitted from
  # the listing endpoint, and `AppConfigService.validate()` rejects any `set(llm.provider, ollama)`
  # or `set(ollama.model, вЂ¦)` write that would land the runtime config in a stuck state.
  ollama:
    enabled: ${APP_OLLAMA_ENABLED:true}
  admin:
    emails: ${APP_ADMIN_EMAILS:}
  # Whitelist of emails authorised to complete the OAuth login. Empty = open mode (backward-compat
  # for a fresh deploy before the admin posts the first list via `/settings/access-control`). The
  # list is runtime-editable through the UI, not redeploy-required вЂ” the admin posts the first
  # email shortly after the initial deploy. The effective set checked at login is `admins в€Є
  # allowed_emails` so an admin cannot lock themselves out by removing their own email from the UI.
  allowed:
    emails: ${APP_ALLOWED_EMAILS:}
  frontend-url: ${APP_FRONTEND_URL:/}

anthropic:
  api:
    # Empty default mirrors the convention used for `market.twelvedata.api-key` and
    # `market.finnhub.api-key` below : a fresh clone must boot without the env var so the user can
    # open `/settings/configuration` and rent the key in the SECRET runtime slot. `ClaudeClient`
    # already raises a clear error at the first call if the key is empty.
    key: ${ANTHROPIC_API_KEY:}
    model: claude-opus-4-6

llm:
  provider: claude

market:
  # provider:
  #   mock        вЂ” deterministic synthetic data (default, no network needed)
  #   twelvedata  вЂ” real REST API, free tier 800 credits/day (requires market.twelvedata.api-key)
  provider: mock
  # Caffeine TTL for the `market-chart` and `news-by-symbol` caches (shared spec). Editable at
  # runtime from /settings/configuration вЂ” the value here is the boot-time default and the fallback
  # when no DB override is set.
  cache:
    ttl-minutes: 15
  twelvedata:
    base-url: https://api.twelvedata.com
    api-key: ${TWELVEDATA_API_KEY:}
  # Finnhub powers the news section on the ticker dossier вЂ” separate provider from the chart
  # data because Twelve Data does not surface a news endpoint on its public API. Free tier :
  # 60 calls / minute, no daily cap. Sign-up : https://finnhub.io/register
  finnhub:
    base-url: https://finnhub.io/api/v1
    api-key: ${FINNHUB_API_KEY:}

# News provider вЂ” separate switch from `market.provider` because news (Finnhub) and chart data
# (Twelve Data) are different vendors. Defaults to `mock` so an onboarding clone or the CI runs
# without a Finnhub key. The actual `market.finnhub.api-key` lives under `market.*` above
# because the keys are co-located by vendor (Finnhub may surface other endpoints later).
news:
  # provider:
  #   mock     вЂ” deterministic synthetic headlines (default, no network needed)
  #   finnhub  вЂ” real REST API (requires market.finnhub.api-key)
  provider: mock

# Analyst recommendations provider вЂ” separate switch from `news.provider` so the user can flip
# them independently (e.g. live Finnhub news with mock analyst recs while iterating). Both
# Finnhub-backed today and share `market.finnhub.api-key`.
analyst:
  # provider:
  #   mock     вЂ” deterministic synthetic recommendations (default, no network needed)
  #   finnhub  вЂ” real REST `/stock/recommendation` + `/stock/price-target` (requires market.finnhub.api-key)
  provider: mock

# Earnings provider вЂ” separate switch from `news.provider` and `analyst.provider` so the user can
# flip them independently. Finnhub-backed today and shares `market.finnhub.api-key`.
earnings:
  # provider:
  #   mock     вЂ” deterministic synthetic earnings (default, no network needed)
  #   finnhub  вЂ” real REST `/stock/earnings` + `/calendar/earnings` (requires market.finnhub.api-key)
  provider: mock

# Market radar provider (Phase 6) вЂ” separate vendor from market/news/analyst/earnings.
# Phase 6 cycles through 3 live providers + the mock :
#   - Polygon (rebrand Massive 2026) snapshot endpoint в†’ paid Stocks Starter only (403 on Basic)
#   - Polygon grouped-daily в†’ 403 on the rebranded free tier too (was advertised free pre-2026)
#   - FMP `/stable/biggest-gainers+losers` в†’ free tier 250 req/jour, retained as the live
#     provider that actually works on $0 (no volume signal вЂ” documented limitation, the radar
#     filter on volumeRatio becomes no-op when fmp is the active provider). The legacy
#     `/api/v3/stock_market/*` paths were deprecated by FMP in August 2025 (403 "Legacy
#     Endpoint" for any subscription started post-cutoff) вЂ” `/stable/*` is the replacement and
#     serves the same JSON shape.
# `polygon` remains wired for the day the user upgrades to Stocks Basic+. Sign-ups :
# https://massive.com for Polygon, https://site.financialmodelingprep.com for FMP.
screener:
  # provider:
  #   mock     вЂ” deterministic synthetic snapshot (default, no network needed)
  #   polygon  вЂ” real REST `/v2/aggs/grouped/locale/us/market/stocks/{date}` (2 calls per refresh
  #              to join recent + previous trading day ; requires screener.polygon.api-key AND a
  #              paid Stocks Basic+ Polygon subscription вЂ” the 2026 rebrand 403'd the historically
  #              free tier)
  #   fmp      вЂ” real REST `/stable/biggest-gainers` + `/biggest-losers` (top 50 movers in 1 call
  #              each ; requires screener.fmp.api-key, free tier 250 req/jour, no volume signal)
  provider: mock
  polygon:
    base-url: https://api.massive.com
    api-key: ${POLYGON_API_KEY:}
  fmp:
    base-url: https://financialmodelingprep.com
    api-key: ${FMP_API_KEY:}

# Sentry вЂ” error tracking. **Disabled by default** so dev local and CI don't ship events.
# `application-prod.yml` flips this to true and provides the DSN (sourced from Secret Manager) +
# environment tag + release tag. We keep an empty `dsn` here so a fresh clone boots without any
# Sentry network activity вЂ” the SDK no-ops when the DSN is empty, even with `enabled: true`.
sentry:
  dsn: ${SENTRY_DSN:}
  # `send-default-pii: false` is intentional вЂ” we capture `userId` UUID via the Logback MDC
  # appender (cf. `SentryUserContextFilter`), never the email or IP. Same convention as
  # `CustomOAuth2UserService.findOrCreateUser` log redaction. Flipping this to true would leak
  # `User-Agent`, `Cookie`, `Referer`, IP, and any header marked PII by Sentry's filter.
  send-default-pii: false

# springdoc-openapi вЂ” Swagger UI / OpenAPI schema. **Disabled by default** so any environment that
# does not explicitly opt-in (CI, eventual prod) never exposes the REST surface. The `local` profile
# overrides both flags to `true` (cf. `application-local.yml`) вЂ” Swagger UI is then reachable at
# `http://localhost:${BACKEND_HOST_PORT}/swagger-ui.html` and surfaced as a link in the Tilt panel.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

