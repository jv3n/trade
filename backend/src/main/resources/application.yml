spring:
  application:
    name: portfolioai-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/portfolioai
    username: portfolioai
    password: portfolioai
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY}
    model: claude-opus-4-6

llm:
  provider: claude

yahoo:
  base-url: https://query1.finance.yahoo.com
  # provider: yahoo (real HTTP, default) | mock (deterministic synthetic data, see
  # MockMarketChartClient — useful when Yahoo rate-limits the dev IP)
  provider: yahoo
