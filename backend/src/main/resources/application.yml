server:
  # Port HTTP du backend natif. Surchargeable via `BACKEND_HOST_PORT` dans `.env` à la racine
  # du repo en cas de conflit avec un autre service local (cf. `.env.example`).
  port: ${BACKEND_HOST_PORT:8080}
  # En dev, le SPA Angular tourne sur un port distinct (4200/4201) et le proxy CLI forward
  # `/api/**`, `/oauth2/**`, `/logout`, `/login/oauth2/**` vers ce backend (cf. `frontend/proxy.conf.js`).
  # `xfwd: true` du proxy ajoute les headers `X-Forwarded-Host/Port/Proto`. `framework` fait que
  # Spring les lit via `ForwardedHeaderFilter` pour construire ses URLs absolues (notamment le
  # `redirect_uri` OAuth envoyé à Google) sur le host du SPA — sinon Google reçoit
  # `localhost:8081` et la session cookie ne sera pas accessible au SPA sur `localhost:4201`.
  # En prod derrière un reverse proxy (nginx, traefik, ALB), même besoin : trust the forwarded
  # headers pour générer les URLs publiques correctes. Risque de spoofing : nul tant que le
  # backend n'est pas exposé directement à internet sans proxy devant.
  forward-headers-strategy: framework

spring:
  application:
    name: portfolioai-backend

  # **Profile activation pilotée par Tilt** — le Tiltfile lit `BACKEND_AUTH_MODE` dans `.env` à
  # l'exécution du `serve_cmd` :
  #   - `BACKEND_AUTH_MODE=no-auth` (défaut) → lance avec `--spring.profiles.active=local,local-no-auth`
  #     → `LocalNoAuthSecurityConfig` bypasse Spring Security, user fake ADMIN (`dev@local.test`)
  #     seedé au boot et injecté dans le SecurityContext sur chaque request.
  #   - `BACKEND_AUTH_MODE=oauth` → lance avec `--spring.profiles.active=local` → `SecurityConfig`
  #     kicks in et utilise la registration `spring.security.oauth2.client.registration.google`
  #     déclarée dans `application-local.yml`. Vrai flow OAuth Google contre localhost.
  #
  # Bouton Tilt « Switch auth mode → oauth/no-auth » disponible sur la ressource `backend` pour
  # flipper sans éditer `.env` à la main.
  #
  # Pas de `spring.profiles.group` hardcodé ici : la décision est entièrement au Tiltfile, ce qui
  # permet le toggle runtime via bouton + restart sans toucher au YAML.

  # OAuth2 client registration — intentionally **absent** from this default config because Spring
  # Boot's `ClientRegistration.Builder.build()` does `Assert.hasText(clientId)` and crashes at boot
  # if a registration is declared with an empty client-id. A fresh clone / CI run needs to start
  # without OAuth credentials (the `@SpringBootTest` smoke test relies on this).
  #
  # Pour activer le vrai flow OAuth Google :
  #   1. Crée un OAuth Client ID dans Google Cloud Console > APIs & Services > Credentials
  #      (Web application). Redirect URI : `http://localhost:<FRONTEND_HOST_PORT>/login/oauth2/code/google`
  #      (le port FRONT, pas backend — le proxy CLI forward avec xfwd et Spring construit son
  #      redirect_uri sur le host du SPA grâce à `server.forward-headers-strategy: framework`).
  #   2. Dans `.env` à la racine (gitignored), définis :
  #        SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=...
  #        SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=...
  #        APP_ADMIN_EMAILS=ton.email@gmail.com    # pour atterrir en role ADMIN
  #        APP_FRONTEND_URL=http://localhost:4201/ # cible du redirect post-login
  #        BACKEND_AUTH_MODE=oauth                  # bascule du `local-no-auth` au mode réel
  #   3. Restart Tilt — le `serve_cmd` du backend `source` `.env`, exporte les vars au sous-process
  #      gradle, et Spring Boot les pickè up via son relaxed binding (env-var → property tree).
  #   4. Le scope OAuth est laissé aux défauts Google fournis par `CommonOAuth2Provider.GOOGLE`
  #      (openid + profile + email) — pas besoin de le surcharger explicitement.
  # En prod, les mêmes env vars sont injectées par le secret manager du provider.

  datasource:
    # Le port Postgres côté hôte est configurable via `POSTGRES_HOST_PORT` dans `.env`
    # (le container reste en 5432 en interne, seul le mapping host:container change). Cf.
    # `.env.example` pour la procédure quand 5432 est déjà occupé localement.
    url: jdbc:postgresql://localhost:${POSTGRES_HOST_PORT:5432}/portfolioai
    username: portfolioai
    password: portfolioai
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # **Baseline on migrate** (livré 2026-05-17 avec la fusion V1→V10 en un seul V1).
    #
    # `baseline-version: 0` est intentionnel — empiriquement vérifié sur DB greenfield :
    # avec `baseline-version: 1`, Flyway baseline la `flyway_schema_history` à V1 et **n'applique
    # pas** V1 sur une DB vide → résultat catastrophique, les 11 tables ne sont jamais créées
    # et Hibernate `ddl-auto: validate` crash au boot. Avec `baseline-version: 0`, le baseline
    # est posé AVANT V1, donc Flyway applique ensuite toutes les migrations >= 1 normalement.
    #
    # Sur une DB existante avec `flyway_schema_history` (cas dev local post-V10), le baseline
    # n'est pas re-déclenché (l'history existe déjà). Pour upgrader cette DB sans repartir de
    # zéro, la procédure est : `docker compose down -v && tilt up` pour reset complet (perte
    # data acceptable single-user). Alternative non-destructive : drop manuellement la table
    # `flyway_schema_history` avant `tilt up` ; Flyway recrée ensuite la table à partir de
    # zéro et baseline à V0 + apply V1 sur le schéma existant. Hibernate `validate` passe parce
    # que le schéma est déjà identique au V1 cible.
    baseline-on-migrate: true
    baseline-version: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Auth — application-level config consumed by `CustomOAuth2UserService` on first user creation
# to assign role ADMIN vs USER. Comma-separated list of emails. Email comparison is
# case-insensitive. Modifications to this list only affect *new* user creations — existing rows
# keep the role they were assigned on first login (DB is the source of truth post-creation).
#
# `frontend-url` est la cible du redirect post-login OAuth (cf. `SecurityConfig.defaultSuccessUrl`).
# Défaut `/` est correct quand le SPA et le backend partagent la même origine (prod derrière un
# reverse proxy). En dev où le SPA tourne sur un port distinct (Angular CLI 4200/4201), surcharger
# dans `application-local.yml` avec l'URL complète du SPA — sinon le user atterrit sur le backend
# (Whitelabel 404 après login).
app:
  admin:
    emails: ${APP_ADMIN_EMAILS:}
  # Whitelist of emails authorised to complete the OAuth login. Empty = open mode (backward-compat
  # for a fresh deploy before the admin posts the first list via `/settings/access-control`). The
  # list is runtime-editable through the UI, not redeploy-required — the admin posts the first
  # email shortly after the initial deploy. The effective set checked at login is `admins ∪
  # allowed_emails` so an admin cannot lock themselves out by removing their own email from the UI.
  allowed:
    emails: ${APP_ALLOWED_EMAILS:}
  frontend-url: ${APP_FRONTEND_URL:/}

anthropic:
  api:
    # Empty default mirrors the convention used for `market.twelvedata.api-key` and
    # `market.finnhub.api-key` below : a fresh clone must boot without the env var so the user can
    # open `/settings/configuration` and rent the key in the SECRET runtime slot. `ClaudeClient`
    # already raises a clear error at the first call if the key is empty.
    key: ${ANTHROPIC_API_KEY:}
    model: claude-opus-4-6

llm:
  provider: claude

market:
  # provider:
  #   mock        — deterministic synthetic data (default, no network needed)
  #   twelvedata  — real REST API, free tier 800 credits/day (requires market.twelvedata.api-key)
  provider: mock
  # Caffeine TTL for the `market-chart` and `news-by-symbol` caches (shared spec). Editable at
  # runtime from /settings/configuration — the value here is the boot-time default and the fallback
  # when no DB override is set.
  cache:
    ttl-minutes: 15
  twelvedata:
    base-url: https://api.twelvedata.com
    api-key: ${TWELVEDATA_API_KEY:}
  # Finnhub powers the news section on the ticker dossier — separate provider from the chart
  # data because Twelve Data does not surface a news endpoint on its public API. Free tier :
  # 60 calls / minute, no daily cap. Sign-up : https://finnhub.io/register
  finnhub:
    base-url: https://finnhub.io/api/v1
    api-key: ${FINNHUB_API_KEY:}

# News provider — separate switch from `market.provider` because news (Finnhub) and chart data
# (Twelve Data) are different vendors. Defaults to `mock` so an onboarding clone or the CI runs
# without a Finnhub key. The actual `market.finnhub.api-key` lives under `market.*` above
# because the keys are co-located by vendor (Finnhub may surface other endpoints later).
news:
  # provider:
  #   mock     — deterministic synthetic headlines (default, no network needed)
  #   finnhub  — real REST API (requires market.finnhub.api-key)
  provider: mock

# Analyst recommendations provider — separate switch from `news.provider` so the user can flip
# them independently (e.g. live Finnhub news with mock analyst recs while iterating). Both
# Finnhub-backed today and share `market.finnhub.api-key`.
analyst:
  # provider:
  #   mock     — deterministic synthetic recommendations (default, no network needed)
  #   finnhub  — real REST `/stock/recommendation` + `/stock/price-target` (requires market.finnhub.api-key)
  provider: mock

# Earnings provider — separate switch from `news.provider` and `analyst.provider` so the user can
# flip them independently. Finnhub-backed today and shares `market.finnhub.api-key`.
earnings:
  # provider:
  #   mock     — deterministic synthetic earnings (default, no network needed)
  #   finnhub  — real REST `/stock/earnings` + `/calendar/earnings` (requires market.finnhub.api-key)
  provider: mock

# springdoc-openapi — Swagger UI / OpenAPI schema. **Disabled by default** so any environment that
# does not explicitly opt-in (CI, eventual prod) never exposes the REST surface. The `local` profile
# overrides both flags to `true` (cf. `application-local.yml`) — Swagger UI is then reachable at
# `http://localhost:${BACKEND_HOST_PORT}/swagger-ui.html` and surfaced as a link in the Tilt panel.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

