server:
  # Port HTTP du backend natif. Surchargeable via `BACKEND_HOST_PORT` dans `.env` à la racine
  # du repo en cas de conflit avec un autre service local (cf. `.env.example`).
  port: ${BACKEND_HOST_PORT:8080}

spring:
  application:
    name: portfolioai-backend

  datasource:
    # Le port Postgres côté hôte est configurable via `POSTGRES_HOST_PORT` dans `.env`
    # (le container reste en 5432 en interne, seul le mapping host:container change). Cf.
    # `.env.example` pour la procédure quand 5432 est déjà occupé localement.
    url: jdbc:postgresql://localhost:${POSTGRES_HOST_PORT:5432}/portfolioai
    username: portfolioai
    password: portfolioai
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY}
    model: claude-opus-4-6

llm:
  provider: claude

market:
  # provider:
  #   mock        — deterministic synthetic data (default, no network needed)
  #   twelvedata  — real REST API, free tier 800 credits/day (requires market.twelvedata.api-key)
  provider: mock
  # Caffeine TTL for the `market-chart` and `news-by-symbol` caches (shared spec). Editable at
  # runtime from /settings/configuration — the value here is the boot-time default and the fallback
  # when no DB override is set.
  cache:
    ttl-minutes: 15
  twelvedata:
    base-url: https://api.twelvedata.com
    api-key: ${TWELVEDATA_API_KEY:}
  # Finnhub powers the news section on the ticker dossier — separate provider from the chart
  # data because Twelve Data does not surface a news endpoint on its public API. Free tier :
  # 60 calls / minute, no daily cap. Sign-up : https://finnhub.io/register
  finnhub:
    base-url: https://finnhub.io/api/v1
    api-key: ${FINNHUB_API_KEY:}

# News provider — separate switch from `market.provider` because news (Finnhub) and chart data
# (Twelve Data) are different vendors. Defaults to `mock` so an onboarding clone or the CI runs
# without a Finnhub key. The actual `market.finnhub.api-key` lives under `market.*` above
# because the keys are co-located by vendor (Finnhub may surface other endpoints later).
news:
  # provider:
  #   mock     — deterministic synthetic headlines (default, no network needed)
  #   finnhub  — real REST API (requires market.finnhub.api-key)
  provider: mock

# Analyst recommendations provider — separate switch from `news.provider` so the user can flip
# them independently (e.g. live Finnhub news with mock analyst recs while iterating). Both
# Finnhub-backed today and share `market.finnhub.api-key`.
analyst:
  # provider:
  #   mock     — deterministic synthetic recommendations (default, no network needed)
  #   finnhub  — real REST `/stock/recommendation` + `/stock/price-target` (requires market.finnhub.api-key)
  provider: mock

# Earnings provider — separate switch from `news.provider` and `analyst.provider` so the user can
# flip them independently. Finnhub-backed today and shares `market.finnhub.api-key`.
earnings:
  # provider:
  #   mock     — deterministic synthetic earnings (default, no network needed)
  #   finnhub  — real REST `/stock/earnings` + `/calendar/earnings` (requires market.finnhub.api-key)
  provider: mock

