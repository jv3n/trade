spring:
  application:
    name: portfolioai-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/portfolioai
    username: portfolioai
    password: portfolioai
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY}
    model: claude-opus-4-6

llm:
  provider: claude

market:
  # provider:
  #   mock        — deterministic synthetic data (default, no network needed)
  #   twelvedata  — real REST API, free tier 800 credits/day (requires market.twelvedata.api-key)
  provider: mock
  twelvedata:
    base-url: https://api.twelvedata.com
    api-key: ${TWELVEDATA_API_KEY:}
