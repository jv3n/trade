# Profil local — surcharge application.properties

# Désactive la validation stricte de la clé API au démarrage
anthropic.api.key=local-placeholder

# Logs SQL en dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — répare automatiquement les checksums en dev
spring.flyway.repair-on-migrate=true
