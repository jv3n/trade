site_name: PortfolioAI
site_description: Optimiseur de portefeuille boursier alimenté par l'IA
site_url: https://jv3n.github.io/trade/
docs_dir: docs

nav:
  - Métier:
      - Vision: metier/vision.md
      - Fonctionnalités: metier/fonctionnalites.md
  - Technique:
      - Onboarding développeur: technique/developper.md
      - Architecture: technique/architecture.md
      - Guide de développement: technique/developpement.md
      - Providers externes: technique/providers.md
      - Ops (CI / CD / tooling): technique/ops.md
  - Projet:
      - Backlog: projet/backlog.md
      - Sources de données: projet/sources.md
      - Conventions de commit: projet/commit-conventions.md
      - Audits:
          - Vue d'ensemble: projet/audits/index.md
          - 2026-05-02 — Revue globale: projet/audits/2026-05-02-revue-globale.md

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - tables
  - admonition
  - pymdownx.superfences
