  - Métier:
      - Vision: metier/vision.md
      - Fonctionnalités: metier/fonctionnalites.md
  - Technique:
      - Onboarding développeur: technique/developper.md
      - Architecture: technique/architecture.md
      - DDD — Bounded Contexts: technique/ddd.md
      - Guide de développement: technique/developpement.md
      - Providers externes: technique/providers.md
      - Ops (CI / CD / tooling): technique/ops.md
  - Devops:
      - Commandes pratiques: devops/commandes-pratiques.md
      - "Déploiement (choix d'hébergement Phase 5)": devops/deploiement.md
      - "Décision : déploiement Ollama": devops/decision-ollama-deploiement.md
  - Projet:
      - Backlog: projet/backlog.md
      - Journal des livraisons: projet/journal-livraisons.md
      - Sources de données: projet/sources.md
      - Conventions de commit: projet/commit-conventions.md
      - Audits:
          - Vue d'ensemble: projet/audits/index.md
          - 2026-05-17 — Revue globale pré-v0.6.0 (Phase 4): projet/audits/2026-05-17-pre-v0.6.0-phase4.md
          - 2026-05-16 — Revue globale pré-v0.5.1: projet/audits/2026-05-16-pre-v0.5.1.md
          - 2026-05-14 — Revue globale fin Phase 3: projet/audits/2026-05-14-fin-phase-3.md
          - 2026-05-10 — Revue globale fin Phase 2.5: projet/audits/2026-05-10-fin-phase-2.5.md
          - 2026-05-06 — Revue globale fin Phase 2: projet/audits/2026-05-06-fin-phase-2.md
          - 2026-05-02 — Revue globale: projet/audits/2026-05-02-revue-globale.md

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: purple
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - tables
  - admonition
  - pymdownx.superfences
