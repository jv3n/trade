@if (form) {
  <aside
    class="radar-tools-sidenav"
    [class.collapsed]="!sidenavOpen()"
    [attr.aria-label]="'radar.filter.title' | translate"
  >
    <header class="sidenav-header">
      @if (sidenavOpen()) {
        <h3>{{ 'radar.filter.title' | translate }}</h3>
      }
      <button
        type="button"
        class="sidenav-toggle"
        (click)="toggleSidenav()"
        [matTooltip]="
          (sidenavOpen() ? 'radar.filter.sidenav.collapse' : 'radar.filter.sidenav.expand')
            | translate
        "
        matTooltipPosition="right"
        [attr.aria-label]="
          (sidenavOpen() ? 'radar.filter.sidenav.collapse' : 'radar.filter.sidenav.expand')
            | translate
        "
        [attr.aria-expanded]="sidenavOpen()"
      >
        <mat-icon>{{ sidenavOpen() ? 'chevron_left' : 'chevron_right' }}</mat-icon>
      </button>
    </header>

    @if (sidenavOpen()) {
      <p class="sidenav-hint">{{ 'radar.filter.universeHint' | translate }}</p>

      <form [formGroup]="form">
        <section class="sidenav-section" [class.expanded]="isSectionExpanded('gap')">
          <button
            type="button"
            class="sidenav-section-header"
            (click)="toggleSection('gap')"
            [attr.aria-expanded]="isSectionExpanded('gap')"
            aria-controls="radar-section-gap"
          >
            <span class="sidenav-section-title">{{ 'radar.filter.sections.gap' | translate }}</span>
            <mat-icon class="sidenav-section-chevron">expand_more</mat-icon>
          </button>
          <div
            id="radar-section-gap"
            class="sidenav-section-body"
            [hidden]="!isSectionExpanded('gap')"
          >
            <mat-form-field appearance="outline" subscriptSizing="dynamic" class="full-width">
              <mat-label>{{ 'radar.filter.gapPctMin' | translate }}</mat-label>
              <input matInput type="number" step="0.5" formControlName="gapPctMin" />
              <span matTextSuffix>%</span>
            </mat-form-field>
          </div>
        </section>

        <section class="sidenav-section" [class.expanded]="isSectionExpanded('volume')">
          <button
            type="button"
            class="sidenav-section-header"
            (click)="toggleSection('volume')"
            [attr.aria-expanded]="isSectionExpanded('volume')"
            aria-controls="radar-section-volume"
          >
            <span class="sidenav-section-title">{{
              'radar.filter.sections.volume' | translate
            }}</span>
            <mat-icon class="sidenav-section-chevron">expand_more</mat-icon>
          </button>
          <div
            id="radar-section-volume"
            class="sidenav-section-body"
            [hidden]="!isSectionExpanded('volume')"
          >
            <mat-form-field appearance="outline" subscriptSizing="dynamic" class="full-width">
              <mat-label>{{ 'radar.filter.volumeRatioMin' | translate }}</mat-label>
              <input matInput type="number" step="0.5" min="0" formControlName="volumeRatioMin" />
              <span matTextSuffix>×</span>
            </mat-form-field>
          </div>
        </section>
      </form>

      <footer class="sidenav-footer">
        <button mat-stroked-button type="button" (click)="reset()">
          <mat-icon>restart_alt</mat-icon>
          {{ 'radar.filter.reset' | translate }}
        </button>
      </footer>
    }
  </aside>
}
