<div class="lexicon-table">
  <mat-form-field appearance="outline" class="search-field" subscriptSizing="dynamic">
    <mat-icon matPrefix>search</mat-icon>
    <input
      matInput
      type="text"
      [value]="searchValue()"
      (input)="onSearchInput($any($event.target).value)"
      [placeholder]="'lexicon.searchPlaceholder' | translate"
    />
    @if (searchValue()) {
      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="clearSearch()"
        [matTooltip]="'lexicon.clearSearch' | translate"
      >
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-form-field>

  @if (filtered().length === 0) {
    <div class="empty-state">
      <mat-icon>search_off</mat-icon>
      <p>{{ 'lexicon.noMatch' | translate: { query: searchValue() } }}</p>
    </div>
  } @else {
    <div stbTable>
      <table mat-table [dataSource]="filtered()">
        <ng-container matColumnDef="term">
          <th mat-header-cell *matHeaderCellDef>{{ 'lexicon.fields.term' | translate }}</th>
          <td mat-cell *matCellDef="let e" class="term-cell">{{ e.term }}</td>
        </ng-container>

        <ng-container matColumnDef="definition">
          <th mat-header-cell *matHeaderCellDef>{{ 'lexicon.fields.definition' | translate }}</th>
          <td mat-cell *matCellDef="let e">{{ definitionFor(e) }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef stbCol="actions"></th>
          <td mat-cell *matCellDef="let e" stbCol="actions">
            <button
              mat-icon-button
              type="button"
              (click)="editEntry.emit(e)"
              [matTooltip]="'lexicon.actions.edit' | translate"
              aria-label="Edit"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              (click)="deleteEntry.emit(e)"
              [matTooltip]="'lexicon.actions.delete' | translate"
              aria-label="Delete"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns()"></tr>
        <tr mat-row *matRowDef="let row; columns: columns()"></tr>
      </table>
    </div>
  }
</div>
