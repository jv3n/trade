services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolioai-postgres
    environment:
      POSTGRES_DB: portfolioai
      POSTGRES_USER: portfolioai
      POSTGRES_PASSWORD: portfolioai
    ports:
      # Le port hôte est configurable via `.env` (POSTGRES_HOST_PORT) en cas de conflit
      # avec un autre service local. Le port interne du container reste 5432 — seul le
      # mapping host:container change.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: portfolioai-ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
