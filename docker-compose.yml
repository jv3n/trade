services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolioai-postgres
    environment:
      POSTGRES_DB: portfolioai
      POSTGRES_USER: portfolioai
      POSTGRES_PASSWORD: portfolioai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: portfolioai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
