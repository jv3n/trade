services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolioai-postgres
    environment:
      POSTGRES_DB: portfolioai
      POSTGRES_USER: portfolioai
      POSTGRES_PASSWORD: portfolioai
    ports:
      # The host port is configurable via `.env` (POSTGRES_HOST_PORT) in case of a conflict with
      # another local service. The container's internal port stays 5432 — only the host:container
      # mapping changes.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: portfolioai-ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
