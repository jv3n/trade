# Cloud Run service descriptor — PortfolioAI production
#
# **STUB** : ce fichier documente le shape attendu du service Cloud Run.
# Le 1er deploy (ticket Phase 5 `Provisionner v1`) sera fait via `gcloud run deploy`
# imperatif (cf. `deploiement.md > §6.2` pour le squelette de workflow GitHub Actions).
# Ce YAML servira à un futur passage à un deploy déclaratif `gcloud run services replace`.
#
# Tags `TODO_...` à remplacer au moment du 1er deploy.
#
# **Désynchronisé volontairement avec `.github/workflows/deploy.yml`** :
# - `deploy.yml` injecte aussi `sentry-dsn-backend` (variable d'env `SENTRY_DSN`) via
#   `--update-secrets` au runtime — pas listé dans ce STUB pour éviter une fausse symétrie.
# - Si un day on bascule sur un deploy déclaratif `gcloud run services replace service.yaml`,
#   ajouter `SENTRY_DSN` au bloc `env:` ci-dessous avec un `valueFrom.secretKeyRef.name:
#   sentry-dsn-backend`. Tant que c'est `gcloud run deploy --update-secrets`, le workflow
#   reste la source de vérité.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: portfolioai
  namespace: trade-496613  # project ID
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all  # publiquement accessible (auth Spring Security côté app)
spec:
  template:
    metadata:
      annotations:
        # Scaling : single-user max 3 instances. Ajustable si on ouvre à plus.
        autoscaling.knative.dev/maxScale: "3"
        autoscaling.knative.dev/minScale: "0"  # scale-to-zero (cold-start ~1-3 s)
        run.googleapis.com/cpu-throttling: "true"  # économise CPU quand idle
        run.googleapis.com/startup-cpu-boost: "true"  # accélère le cold-start
    spec:
      serviceAccountName: portfolioai-runtime@trade-496613.iam.gserviceaccount.com
      timeoutSeconds: 300  # 5 min — couvre les requêtes LLM longues (Claude API)
      containerConcurrency: 80  # default Cloud Run, fits single-user

      containers:
        - image: northamerica-northeast1-docker.pkg.dev/trade-496613/backend/portfolioai:TODO_TAG  # remplir au deploy
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
          # Health checks (Cloud Run respecte le startupProbe avant de router le trafic)
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 30  # ~5 min pour le cold-start Spring Boot + Flyway
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 30
            failureThreshold: 3

          env:
            # Spring profile actif en prod (lit application-prod.yml dans le jar)
            - name: SPRING_PROFILES_ACTIVE
              value: prod

            # URL publique de l'app, consommée par SecurityConfig.defaultSuccessUrl
            # À mettre à jour quand on attache un custom domain via Cloudflare.
            - name: APP_FRONTEND_URL
              value: TODO_URL  # ex: https://portfolioai.fly.dev (initial) puis https://portfolioai.example.com

            # Secrets boot-time mountés depuis GCP Secret Manager
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-oauth-client-id
                  key: latest
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-oauth-client-secret
                  key: latest
            - name: APP_ADMIN_EMAILS
              valueFrom:
                secretKeyRef:
                  name: app-admin-emails
                  key: latest
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-db-url
                  key: latest
  traffic:
    - latestRevision: true
      percent: 100
